{% extends "base.html" %}


{% block content %}


<div class="container mt-5">


<div class="row justify-content-center">


<div class="col-md-6 col-lg-5">


<div class="card shadow-lg border-0">


<div class="card-body p-5">


<h2 class="text-center mb-4">

Create Account

</h2>



{% if error %}

<div class="alert alert-danger">

{{error}}

</div>

{% endif %}



<form method="POST">

{% csrf_token %}



<div class="row">


<div class="col-md-6 mb-3">

<label class="form-label">
First Name
</label>

<input 
type="text"
name="first_name"
class="form-control"
placeholder="First name"
required>

</div>



<div class="col-md-6 mb-3">

<label class="form-label">
Last Name
</label>

<input 
type="text"
name="last_name"
class="form-control"
placeholder="Last name">

</div>


</div>




<div class="mb-3">

<label class="form-label">
Username
</label>

<input 
type="text"
name="username"
class="form-control"
placeholder="Enter username"
required>

</div>




<div class="mb-3">

<label class="form-label">
Email Address
</label>

<input 
type="email"
name="email"
class="form-control"
placeholder="example@gmail.com"
required>

</div>




<div class="mb-3">

<label class="form-label">
Password
</label>


<input 
type="password"
name="password"
class="form-control"
placeholder="Enter password"
required>


</div>




<div class="mb-3">

<label class="form-label">
Confirm Password
</label>


<input 
type="password"
name="confirm_password"
class="form-control"
placeholder="Confirm password"
required>


</div>





<button 
class="btn btn-primary w-100 py-2">

Register

</button>



</form>




<div class="text-center mt-4">

<p>

Already have an account?

<a href="{% url 'user_accounts:login' %}"
class="text-decoration-none">

Login

</a>

</p>

</div>



</div>

</div>


</div>


</div>


</div>


{% endblock %}
