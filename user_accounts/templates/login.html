<!-- {% extends 'base.html' %} -->

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow">

                <div class="card-body">

                    <h3 class="text-center mb-4">
                        Login
                    </h3>


                    {% if error %}

                    <div class="alert alert-danger">
                        {{ error }}
                    </div>

                    {% endif %}


                    <form method="POST">

                        {% csrf_token %}


                        <div class="mb-3">
                            <label>Username</label>
                            <input 
                            type="text" 
                            name="username" 
                            class="form-control"
                            placeholder="Enter username">
                        </div>


                        <div class="mb-3">

                            <label>Password</label>

                            <input 
                            type="password" 
                            name="password"
                            class="form-control"
                            placeholder="Enter password">

                        </div>


                        <button class="btn btn-primary w-100">
                            Login
                        </button>


                    </form>


                </div>

            </div>

        </div>

    </div>

</div>


{% endblock %}
