{% extends 'base.html' %}
{% load static %}
{% block title %}Home - MyShop{% endblock %}

{% block content %}

<!-- Banner Start -->
<div class="container mt-3">
    <div id="bannerCarousel" class="carousel slide" data-bs-ride="carousel">

        <div class="carousel-inner">

            <div class="carousel-item active">
                <img src="{% static 'images/banner1.jpg' %}" class="d-block w-100" alt="banner 1">
            </div>

            <div class="carousel-item">
                <img src="{% static 'images/banner2.jpg' %}" class="d-block w-100" alt="banner 2">
            </div>

            <div class="carousel-item">
                <img src="{% static 'images/banner3.jpg' %}" class="d-block w-100" alt="banner 3">
            </div>

        </div>

    </div>
</div>
<!-- Banner End -->


<!-- Products Section -->
<div class="container mt-5">
    <div class="row">

        {% for product in products %}

        <div class="col-md-4 mb-4">
            <div class="card h-100 shadow-sm">

                <img src="{{ product.image }}"
                     class="card-img-top"
                     alt="{{ product.name }}"
                     style="height:300px; object-fit:cover;">

                <div class="card-body d-flex flex-column">

                    <h4>
                        <a href="{% url 'shop:product_details' product.id %}"
                           class="text-decoration-none text-dark">
                            {{ product.name }}
                        </a>
                    </h4>

                    <p>{{ product.description }}</p>

                    <h5 class="text-success">৳ {{ product.price }}</h5>

                    <p><strong>Stock:</strong> {{ product.stock }}</p>

                    <div class="mt-auto">
                        <a href="{% url 'shop:product_details' product.id %}"
                           class="btn btn-primary">
                            View Details
                        </a>

                        <a href="{% url 'cart:add_to_cart' product.id %}"
                           class="btn btn-success">
                            Add to Cart
                        </a>
                    </div>

                </div>

            </div>
        </div>

        {% endfor %}

    </div>
</div>

{% endblock %}
