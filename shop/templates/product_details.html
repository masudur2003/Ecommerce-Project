{% extends 'base.html' %}

{% block title %}
{{ product.name }}
{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="row">

        <div class="col-md-6">

            <img src="{{ product.image }}"
                 class="img-fluid rounded">

        </div>

        <div class="col-md-6">

            <h2>{{ product.name }}</h2>

            <h3 class="text-success">
                ৳ {{ product.price }}
            </h3>

            <p>
                {{ product.description }}
            </p>

            <p>

                {% if product.stock > 0 %}

                    <span class="badge bg-success">
                        In Stock
                    </span>

                {% else %}

                    <span class="badge bg-danger">
                        Out of Stock
                    </span>

                {% endif %}

            </p>

            <button class="btn btn-success">
                Add to Cart
            </button>

        </div>

    </div>

</div>

{% endblock %}
