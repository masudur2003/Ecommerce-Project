{% extends 'base.html' %}


{% block content %}


<div class="container mt-4">


<h3>
Search Result for "{{query}}"
</h3>


<div class="row">


{% for product in products %}


<div class="col-md-3 mt-3">


<div class="card shadow">


<img src="{{product.image}}" alt="{{product.name}}"
class="card-img-top"
height="200">


<div class="card-body">

<h5>
{{product.name}}
</h5>


<p>
Price: ${{product.price}}
</p>


<a href="{% url 'shop:product_details' product.id %}" class="btn btn-primary">
View Product
</a>


</div>


</div>


</div>


{% empty %}


<h5>
No Product Found
</h5>


{% endfor %}


</div>


</div>


{% endblock %}
