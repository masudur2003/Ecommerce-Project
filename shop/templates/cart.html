{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/cart.css' %}">
</head>

<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">🛒 Your Cart</h2>

    <div class="table-responsive">

        <table class="table table-bordered table-hover text-center align-middle">

            <thead class="table-dark">
                <tr>
                    <th>Product</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Total</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                {% for product in products %}
                <tr>
                    <td>{{ product.name }}</td>

                    <td>৳ {{ product.price }}</td>

                    <td>
                        <a href="{% url 'decrease_quantity' product.id %}" class="btn btn-warning btn-sm">-</a>

                        <span class="mx-2">{{ product.quantity }}</span>

                        <a href="{% url 'increase_quantity' product.id %}" class="btn btn-success btn-sm">+</a>
                    </td>

                    <td>৳ {{ product.total_price }}</td>

                    <td>
                        <a href="{% url 'remove_from_cart' product.id %}"
                           class="btn btn-danger btn-sm remove-btn">
                           Remove
                        </a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="5" class="text-muted">Your cart is empty 🛍️</td>
                </tr>
                {% endfor %}
            </tbody>

        </table>

    </div>

    <!-- Total Section -->
    <div class="cart-summary mt-4 p-3 shadow-sm">
        <h4>Total: <span class="text-success">৳ {{ total }}</span></h4>
        <button class="btn btn-primary mt-2" id="checkoutBtn">Proceed to Checkout</button>
    </div>

</div>

<!-- JS -->
<script src="{% static 'js/cart.js' %}"></script>

</body>
</html>
