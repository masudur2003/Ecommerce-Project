{% extends "base.html" %}

{% block content %}

<h2>{{ category.name }}</h2>

<div class="row">

{% for product in products %}

<div class="col-md-3">

    <div class="card">

        <img src="{{ product.image }}" class="card-img-top">

        <div class="card-body">

            <h5>{{ product.name }}</h5>

            <p>${{ product.price }}</p>

        </div>

    </div>

</div>

{% empty %}

<p>No Product Found.</p>

{% endfor %}

</div>

{% endblock %}
